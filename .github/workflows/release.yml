name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "20[0-9][0-9].*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # goreleaser needs full history for changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Tidy modules
        run: go mod tidy

      - name: Commit go.sum if missing
        if: github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet -- go.sum go.mod; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add go.sum go.mod
            git commit -m "chore: add go.sum [skip ci]"
            git push
          fi

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-buildx-action@v4

      - name: Release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean' || 'build --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
